
<h2 class="sr-only">High-level tasks for building an inventory management system, grouped by phase</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.board{padding:1rem 0;display:flex;flex-direction:column;gap:1.5rem}
.phase{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.phase-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.phase-count{font-size:12px;color:var(--color-text-secondary);margin-left:auto}
.tasks{display:flex;flex-direction:column}
.task{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background 0.1s}
.task:last-child{border-bottom:none}
.task:hover{background:var(--color-background-secondary)}
.task-check{width:16px;height:16px;border-radius:4px;border:0.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.task-check.done{background:var(--color-text-primary);border-color:var(--color-text-primary)}
.check-mark{width:8px;height:8px;display:none}
.task-check.done .check-mark{display:block}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;color:var(--color-text-primary);line-height:1.4}
.task-name.done{text-decoration:line-through;color:var(--color-text-secondary)}
.task-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4}
.task-tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;margin-left:8px;vertical-align:middle;font-weight:400}
.progress-bar-wrap{height:3px;background:var(--color-background-secondary);margin:0 16px 12px;border-radius:2px;overflow:hidden}
.progress-bar{height:100%;border-radius:2px;transition:width 0.3s}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.metric-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}
</style>

<div class="board">
  <div class="summary" id="summary"></div>
  <div id="phases"></div>
</div>

<script>
const data = [
  {
    id:'p1', label:'Planning & requirements', color:'#7F77DD',
    tasks:[
      {id:'t1', name:'Define system scope and goals', sub:'Identify stakeholders, use cases, and success metrics'},
      {id:'t2', name:'Gather functional requirements', sub:'Stock tracking, product CRUD, alerts, reporting needs'},
      {id:'t3', name:'Identify non-functional requirements', sub:'Performance, scalability, security, access control'},
      {id:'t4', name:'Choose tech stack', sub:'Database, backend framework, frontend, hosting'},
    ]
  },
  {
    id:'p2', label:'Data modelling & architecture', color:'#1D9E75',
    tasks:[
      {id:'t5', name:'Design database schema', sub:'Products, categories, stock levels, transactions, users'},
      {id:'t6', name:'Define stock transaction model', sub:'Track every add/remove event with timestamps and reasons'},
      {id:'t7', name:'Plan API structure', sub:'REST or GraphQL endpoints for products, stock, alerts, reports'},
      {id:'t8', name:'Design system architecture', sub:'Monolith vs microservices, auth layer, caching strategy'},
    ]
  },
  {
    id:'p3', label:'Core product management', color:'#378ADD',
    tasks:[
      {id:'t9', name:'Build product catalogue', sub:'Create, read, update, delete products with SKU and categories'},
      {id:'t10', name:'Implement stock level tracking', sub:'Current quantity, low-stock threshold per product'},
      {id:'t11', name:'Build stock adjustment flows', sub:'Add stock (purchase/return) and remove stock (sale/write-off)'},
      {id:'t12', name:'Add transaction history log', sub:'Immutable record of every stock change with metadata'},
    ]
  },
  {
    id:'p4', label:'Alerts & automation', color:'#BA7517',
    tasks:[
      {id:'t13', name:'Low-stock alert system', sub:'Trigger notifications when stock falls below threshold'},
      {id:'t14', name:'Out-of-stock handling', sub:'Flag products, optionally block further removals'},
      {id:'t15', name:'Automated reorder suggestions', sub:'Based on threshold and average consumption rate'},
    ]
  },
  {
    id:'p5', label:'Reporting & visibility', color:'#D85A30',
    tasks:[
      {id:'t16', name:'Dashboard with key metrics', sub:'Total products, stock value, low/out-of-stock counts'},
      {id:'t17', name:'Stock movement report', sub:'Inbound vs outbound over time, by product or category'},
      {id:'t18', name:'CSV / export functionality', sub:'Allow bulk data download for external analysis'},
    ]
  },
  {
    id:'p6', label:'Access control & security', color:'#534AB7',
    tasks:[
      {id:'t19', name:'User authentication', sub:'Login, session management, password policies'},
      {id:'t20', name:'Role-based access control', sub:'Admin, manager, viewer — different permissions per role'},
      {id:'t21', name:'Audit logging', sub:'Record who changed what and when'},
    ]
  },
  {
    id:'p7', label:'Testing & deployment', color:'#888780',
    tasks:[
      {id:'t22', name:'Write unit and integration tests', sub:'Cover stock logic, edge cases (negative stock, concurrent edits)'},
      {id:'t23', name:'User acceptance testing', sub:'Validate with actual inventory workflows and real users'},
      {id:'t24', name:'Set up CI/CD pipeline', sub:'Automated testing and deployment on each code change'},
      {id:'t25', name:'Deploy to production', sub:'Staging environment, rollback plan, monitoring and uptime alerts'},
    ]
  }
];

const done = new Set();

function countDone(phase){ return phase.tasks.filter(t=>done.has(t.id)).length; }
function totalTasks(){ return data.reduce((s,p)=>s+p.tasks.length,0); }
function totalDone(){ return done.size; }

function renderSummary(){
  const total=totalTasks(), completed=totalDone(), phases=data.length, pDone=data.filter(p=>countDone(p)===p.tasks.length).length;
  document.getElementById('summary').innerHTML=`
    <div class="metric"><div class="metric-label">Total tasks</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-value">${completed}</div></div>
    <div class="metric"><div class="metric-label">Remaining</div><div class="metric-value">${total-completed}</div></div>
    <div class="metric"><div class="metric-label">Phases done</div><div class="metric-value">${pDone} / ${phases}</div></div>
  `;
}

function renderPhases(){
  document.getElementById('phases').innerHTML = data.map(phase=>{
    const d=countDone(phase), t=phase.tasks.length, pct=Math.round(d/t*100);
    return `<div class="phase">
      <div class="phase-header">
        <div class="phase-dot" style="background:${phase.color}"></div>
        <span class="phase-title">${phase.label}</span>
        <span class="phase-count">${d}/${t}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${phase.color}"></div></div>
      <div class="tasks">${phase.tasks.map(task=>{
        const isDone=done.has(task.id);
        return `<div class="task" onclick="toggle('${task.id}')">
          <div class="task-check${isDone?' done':''}">
            <svg class="check-mark" viewBox="0 0 8 8" fill="none"><polyline points="1,4 3,6 7,2" stroke="var(--color-background-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="task-body">
            <div class="task-name${isDone?' done':''}">${task.name}</div>
            <div class="task-sub">${task.sub}</div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function toggle(id){ done.has(id)?done.delete(id):done.add(id); render(); }
function render(){ renderSummary(); renderPhases(); }
render();
</script>
